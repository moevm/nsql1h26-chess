server {
    listen 80;
    server_name localhost;

    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # Статика приложения часто меняется. В дев-цикле проще запретить
    # кеширование вовсе: no-store гарантирует, что браузер каждый раз тянет
    # свежий файл и не показывает поведение старой версии после пересборки.
    location ~* \.(html|js|css)$ {
        add_header Cache-Control "no-store, must-revalidate";
        add_header Pragma "no-cache";
        expires off;
        etag off;
        if_modified_since off;
        try_files $uri =404;
    }

    # ^~ — чтобы этот префикс имел приоритет над regex-локацией статики ниже
    # (иначе /api/cc/lib.js попадёт под \.js$ и вернётся 404 вместо проксирования).
    location ^~ /api/ {
        proxy_pass http://backend:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_cache_bypass $http_upgrade;
    }
}